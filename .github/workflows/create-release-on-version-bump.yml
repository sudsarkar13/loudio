name: Create Release on Version Bump

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release context
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.current.outputs.tag }}
      version_changed: ${{ steps.bump.outputs.changed }}
      release_exists: ${{ steps.release_check.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version from package.json
        id: current
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read previous version from package.json
        id: previous
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          PREVIOUS_VERSION=$(node -e "
            const { execSync } = require('child_process');
            const beforeSha = process.env.BEFORE_SHA || '';
            const zeroSha = /^0+$/;

            if (!beforeSha || zeroSha.test(beforeSha)) {
              process.stdout.write('');
              process.exit(0);
            }

            try {
              const raw = execSync(`git show ${beforeSha}:package.json`, { encoding: 'utf8' });
              const json = JSON.parse(raw);
              process.stdout.write(json.version || '');
            } catch {
              process.stdout.write('');
            }
          ")

          echo "version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$PREVIOUS_VERSION" ]; then
            echo "tag=v$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether version was bumped
        id: bump
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          PREVIOUS_VERSION: ${{ steps.previous.outputs.version }}
        run: |
          if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether release already exists for tag
        if: steps.bump.outputs.changed == 'true'
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.current.outputs.tag }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Default release-exists output when no bump
        if: steps.bump.outputs.changed != 'true'
        id: release_check_default
        run: echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Check whether remote tag already exists
        if: steps.bump.outputs.changed == 'true' && steps.release_check.outputs.exists == 'false'
        id: tag_check
        env:
          TAG: ${{ steps.current.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag for new version
        if: steps.bump.outputs.changed == 'true' && steps.release_check.outputs.exists == 'false' && steps.tag_check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.current.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build release summary intro for description
        if: steps.bump.outputs.changed == 'true' && steps.release_check.outputs.exists == 'false'
        id: release_intro
        env:
          CURRENT_TAG: ${{ steps.current.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.previous.outputs.tag }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          RANGE=""

          if [ -n "$PREVIOUS_TAG" ] && git rev-parse "$PREVIOUS_TAG" >/dev/null 2>&1; then
            RANGE="$PREVIOUS_TAG..$CURRENT_SHA"
          elif [ -n "$BEFORE_SHA" ] && ! echo "$BEFORE_SHA" | grep -Eq '^0+$'; then
            RANGE="$BEFORE_SHA..$CURRENT_SHA"
          fi

          if [ -n "$RANGE" ]; then
            COMMIT_LINES=$(git log --no-merges --pretty=format:'- %s (%h)' "$RANGE" | head -n 20)
          else
            COMMIT_LINES=$(git log --no-merges --pretty=format:'- %s (%h)' -n 20)
          fi

          if [ -z "$COMMIT_LINES" ]; then
            COMMIT_LINES='- Internal maintenance updates.'
          fi

          {
            echo "body<<EOF"
            echo "## What changed in this version"
            echo
            echo "### Highlights"
            echo "$COMMIT_LINES"
            echo
            echo "### Upgrade context"
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "- Previous version: $PREVIOUS_TAG"
            else
              echo "- Previous version: not detected"
            fi
            echo "- Current version: $CURRENT_TAG"
            echo
            echo "---"
            echo
            echo "## Auto-generated release notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with generated changelog
        if: steps.bump.outputs.changed == 'true' && steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.current.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Loudio ${{ steps.current.outputs.tag }}
          body: ${{ steps.release_intro.outputs.body }}
          generate_release_notes: true
          draft: false
          prerelease: false

  build-ubuntu-deb:
    name: Build Ubuntu .deb
    needs: prepare-release
    if: needs.prepare-release.outputs.version_changed == 'true' && needs.prepare-release.outputs.release_exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Build Ubuntu .deb bundle
        run: yarn tauri build --bundles deb

      - name: Upload .deb artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: loudio-ubuntu-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Attach .deb to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: src-tauri/target/release/bundle/deb/*.deb
          overwrite_files: true

  build-macos-dmg:
    name: Build macOS .dmg
    needs: prepare-release
    if: needs.prepare-release.outputs.version_changed == 'true' && needs.prepare-release.outputs.release_exists == 'false'
    runs-on: macos-latest

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Build macOS dmg bundle
        run: yarn tauri build --bundles dmg

      - name: Upload macOS dmg artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: loudio-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach macOS dmg to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: src-tauri/target/release/bundle/dmg/*.dmg
          overwrite_files: true
