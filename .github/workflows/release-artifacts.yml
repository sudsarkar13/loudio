name: Build and Attach Release Artifacts

on:
  workflow_run:
    workflows:
      - Create Release on Version Bump
    types:
      - completed

permissions:
  contents: write

jobs:
  resolve-release:
    name: Resolve release context
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ github.event.workflow_run.head_sha }}
      release_exists: ${{ steps.release_check.outputs.exists }}

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Read version/tag from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether release exists for tag
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-ubuntu-deb:
    name: Build Ubuntu .deb
    needs: resolve-release
    if: needs.resolve-release.outputs.release_exists == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Build Ubuntu .deb bundle
        run: yarn tauri build --bundles deb

      - name: Upload .deb artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: loudio-ubuntu-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Attach .deb to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          files: src-tauri/target/release/bundle/deb/*.deb

  build-macos-dmg:
    name: Build macOS .dmg
    needs: resolve-release
    if: needs.resolve-release.outputs.release_exists == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Build macOS dmg bundle
        run: yarn tauri build --bundles dmg

      - name: Upload macOS dmg artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: loudio-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach macOS dmg to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          files: src-tauri/target/release/bundle/dmg/*.dmg
